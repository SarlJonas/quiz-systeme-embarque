<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Systèmes embarqués & Raspberry Pi — Jonas School</title>
<style>
  :root{
    --navy:#152a4e; --gold:#d4a017; --paper:#fbf8f1; --line:#e2d8c4;
    --pi:#c51a4a; --pi-soft:#fae3ea; --navy-soft:#e6ebf3;
    --good:#2e7d52; --bad:#c0392b; --muted:#6b6356; --white:#fff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Segoe UI',system-ui,sans-serif;
    background:var(--paper);color:var(--navy);
    line-height:1.55;padding:24px 16px;
  }
  .wrap{max-width:720px;margin:0 auto}
  header{text-align:center;margin-bottom:24px;padding-bottom:22px;border-bottom:3px double var(--navy)}
  header img.logo{width:130px;height:auto;margin-bottom:8px}
  header h1{font-size:1.7rem;letter-spacing:-.5px;color:var(--navy)}
  header .sub{color:var(--gold);font-weight:700;margin-top:4px;font-size:.95rem;text-transform:uppercase;letter-spacing:1px}
  header .meta{color:var(--muted);margin-top:8px;font-size:.9rem}
  .bar{display:flex;justify-content:space-between;align-items:center;
    background:var(--white);border:1px solid var(--line);border-radius:10px;
    padding:10px 16px;margin-bottom:20px;font-size:.9rem;position:sticky;top:8px;z-index:5;
    box-shadow:0 2px 6px rgba(21,42,78,.06)}
  .bar .prog{font-weight:600}
  .track{height:6px;background:var(--line);border-radius:99px;flex:1;margin:0 14px;overflow:hidden}
  .track i{display:block;height:100%;width:0;background:var(--gold);transition:width .3s}
  .q{background:var(--white);border:1px solid var(--line);border-radius:12px;
    padding:20px;margin-bottom:16px;box-shadow:0 1px 0 rgba(0,0,0,.03)}
  .qimg{width:100%;max-height:260px;object-fit:cover;border-radius:9px;margin-bottom:14px;
    border:1px solid var(--line);display:block}
  .tag{display:inline-block;font-size:.72rem;font-weight:700;text-transform:uppercase;
    letter-spacing:.5px;padding:3px 9px;border-radius:6px;margin-bottom:10px;
    background:var(--pi-soft);color:var(--pi)}
  .q h3{font-size:1.05rem;margin-bottom:14px;font-weight:600}
  .q h3 code,.opt code{background:#f1ece1;padding:1px 6px;border-radius:4px;font-size:.92em}
  .opt{display:block;border:1.5px solid var(--line);border-radius:9px;
    padding:11px 14px;margin-bottom:9px;cursor:pointer;transition:.15s;font-size:.95rem}
  .opt:hover{border-color:var(--navy)}
  .opt input{margin-right:9px}
  .opt.correct{background:#e7f5ee;border-color:var(--good)}
  .opt.wrong{background:#fbeae8;border-color:var(--bad)}
  .opt.locked{cursor:default;pointer-events:none}
  .why{font-size:.86rem;color:var(--muted);margin-top:10px;padding-left:12px;
    border-left:3px solid var(--gold);display:none}
  .why.show{display:block}
  .actions{text-align:center;margin:26px 0 30px}
  button{font:inherit;font-weight:700;border:none;border-radius:10px;
    padding:13px 30px;cursor:pointer;background:var(--navy);color:#fff;font-size:1rem}
  button:disabled{opacity:.4;cursor:not-allowed}
  button.ghost{background:var(--white);color:var(--navy);border:1.5px solid var(--navy);margin-left:10px}
  #report{display:none;background:var(--white);border:2px solid var(--navy);border-radius:14px;
    padding:28px;margin-bottom:30px;text-align:center}
  #report.show{display:block}
  .score{font-size:3rem;font-weight:800;letter-spacing:-2px;color:var(--navy)}
  .score small{font-size:1.1rem;color:var(--muted);font-weight:500}
  .verdict{font-size:1.15rem;font-weight:600;margin:6px 0 18px}
  footer{margin-top:30px;padding-top:22px;border-top:3px double var(--navy);
    text-align:center;font-size:.85rem;color:var(--muted)}
  footer .sig{color:var(--navy);font-weight:700;font-size:.95rem;margin-bottom:6px}
  footer .sig span{color:var(--gold)}
  footer a{color:var(--navy);text-decoration:none}
</style>
</head>

<script>
const QUESTIONS = [
  {q:"Qu'est-ce qu'un Raspberry Pi ?", o:["Un logiciel de programmation","Un nano-ordinateur monocarte","Un type de capteur","Un langage de code"], a:1,
   why:"Le Raspberry Pi est un ordinateur complet de la taille d'une carte de crédit (nano-ordinateur monocarte)."},
  {q:"Qu'est-ce qu'un système embarqué ?", o:["Un système informatique intégré dans un appareil pour une tâche dédiée","Un ordinateur de bureau","Un site web","Un réseau social"], a:0,
   why:"Un système embarqué est un système électronique/informatique dédié à une fonction précise, intégré dans un appareil."},
  {q:"Que signifie le sigle GPIO ?", o:["General Purpose Input/Output","Global Pi Input Output","Graphic Processing Input","General Pi Operation"], a:0,
   why:"GPIO = General Purpose Input/Output : les broches d'entrée/sortie polyvalentes de la carte."},
  {q:"Quel langage est le plus utilisé pour débuter sur Raspberry Pi ?", o:["Assembleur","Python","COBOL","SQL"], a:1,
   why:"Python est le langage recommandé pour débuter (le « Pi » de Raspberry Pi fait d'ailleurs référence à Python)."},
  {q:"Quel est le système d'exploitation officiel du Raspberry Pi ?", o:["Windows 11","macOS","Raspberry Pi OS","Android"], a:2,
   why:"Raspberry Pi OS (anciennement Raspbian) est le système officiel, basé sur Linux."},
  {q:"Sur quoi stocke-t-on le système d'un Raspberry Pi classique ?", o:["Un disque dur interne","Une carte microSD","Un CD-ROM","La mémoire vive"], a:1,
   why:"Le système est généralement installé sur une carte microSD insérée dans la carte."},
  {q:"À quoi sert une breadboard (plaque d'essai) ?", o:["Refroidir la carte","Monter un circuit sans soudure","Stocker des fichiers","Alimenter en Wi-Fi"], a:1,
   why:"La breadboard permet de prototyper un circuit électronique sans soudure, en enfichant les composants."},
  {q:"Que doit-on toujours mettre en série avec une LED ?", o:["Un condensateur","Une résistance","Un transistor","Rien"], a:1,
   why:"Une résistance limite le courant et protège la LED de la surchauffe/destruction."},
  {q:"Quelle tension délivrent les broches GPIO d'un Raspberry Pi ?", o:["3,3 V","5 V","12 V","220 V"], a:0,
   why:"Les broches GPIO fonctionnent en logique 3,3 V — appliquer 5 V peut endommager la carte."},
  {q:"Qu'est-ce qu'un capteur ?", o:["Un composant qui produit du son","Un composant qui mesure une grandeur physique","Une mémoire","Un écran"], a:1,
   why:"Un capteur convertit une grandeur physique (température, lumière, mouvement...) en signal électrique."},
  {q:"Qu'est-ce qu'un actionneur ?", o:["Un composant qui agit sur le monde physique (moteur, LED...)","Un capteur de lumière","Un câble","Un fichier"], a:0,
   why:"Un actionneur exécute une action physique : moteur, LED, relais, buzzer, etc."},
  {q:"Que veut dire l'acronyme LED ?", o:["Light Emitting Diode","Low Energy Device","Linux Embedded Driver","Large Electric Diode"], a:0,
   why:"LED = Light Emitting Diode (diode électroluminescente), qui émet de la lumière."},
  {q:"Comment se nomme la commande Linux pour installer un logiciel sur Raspberry Pi OS ?", o:["install.exe","apt","download","setup"], a:1,
   why:"La commande « apt » (ex. sudo apt install ...) gère l'installation des paquets sous Debian/Raspberry Pi OS."},
  {q:"À quoi sert le préfixe <code>sudo</code> dans une commande ?", o:["Annuler la commande","Exécuter avec les droits administrateur","Sauvegarder un fichier","Éteindre la carte"], a:1,
   why:"sudo exécute une commande avec les privilèges administrateur (super-utilisateur)."},
  {q:"Quel connecteur fournit la sortie vidéo sur un Raspberry Pi récent ?", o:["VGA","HDMI","Série RS-232","Parallèle"], a:1,
   why:"Le Raspberry Pi utilise une (ou deux) sortie(s) HDMI pour l'affichage."},
  {q:"Quelle bibliothèque Python est courante pour piloter les GPIO ?", o:["NumPy","RPi.GPIO ou gpiozero","Pandas","Flask"], a:1,
   why:"RPi.GPIO et gpiozero sont les bibliothèques classiques pour contrôler les broches en Python."},
  {q:"Que se passe-t-il si on coupe brutalement l'alimentation du Raspberry Pi ?", o:["Rien du tout","On risque de corrompre la carte SD","La carte gagne en vitesse","Le Wi-Fi s'améliore"], a:1,
   why:"Couper l'alimentation sans arrêt propre peut corrompre le système de fichiers sur la carte SD."},
  {q:"Qu'est-ce que le PWM (Pulse Width Modulation) permet de faire ?", o:["Augmenter la mémoire","Faire varier la puissance (luminosité, vitesse moteur)","Connecter au Wi-Fi","Compiler du code"], a:1,
   why:"Le PWM module la largeur d'impulsion pour contrôler finement la luminosité d'une LED ou la vitesse d'un moteur."},
  {q:"Combien de broches compte le connecteur GPIO des Raspberry Pi modernes ?", o:["8","26","40","100"], a:2,
   why:"Les modèles récents disposent d'un connecteur de 40 broches."},
  {q:"Quel composant protège un circuit en cas de mauvaise manipulation ?", o:["La résistance","L'écran","Le clavier","Le haut-parleur"], a:0,
   why:"La résistance limite le courant et protège les composants comme les LED ou les GPIO."}
];

const form = document.getElementById('quiz');
const submitBtn = document.getElementById('submit');
let answered = {};

QUESTIONS.forEach(function(item, i){
  const div = document.createElement('div');
  div.className = 'q';
  // Emplacement image : dépose tes photos dans img/q1.jpg, img/q2.jpg, ...
  // Si l'image est absente, son emplacement se masque automatiquement.
  const img = '<img class="qimg" src="img/q'+(i+1)+'.jpg" alt="Illustration question '+(i+1)+'" '
    + 'onerror="this.style.display=&quot;none&quot;">';
  let opts = '';
  item.o.forEach(function(opt, j){
    opts += '<label class="opt" data-q="'+i+'" data-o="'+j+'">'
      + '<input type="radio" name="q'+i+'" value="'+j+'">'+opt+'</label>';
  });
  div.innerHTML = '<span class="tag">Raspberry Pi</span>'+img
    +'<h3>'+(i+1)+'. '+item.q+'</h3>'+opts
    +'<div class="why" id="why'+i+'">'+item.why+'</div>';
  form.appendChild(div);
});

form.addEventListener('change', function(e){
  if (e.target.name) {
    answered[+e.target.name.slice(1)] = +e.target.value;
    updateProgress();
  }
});

function updateProgress(){
  const n = Object.keys(answered).length;
  document.getElementById('prog').textContent = n+' / 20 répondues';
  document.getElementById('fill').style.width = (n/20*100)+'%';
  submitBtn.disabled = n < 20;
}

submitBtn.addEventListener('click', function(){
  let total = 0;
  QUESTIONS.forEach(function(item, i){
    const labels = document.querySelectorAll('.opt[data-q="'+i+'"]');
    const chosen = answered[i];
    labels.forEach(function(l){ l.classList.add('locked'); });
    document.getElementById('why'+i).classList.add('show');
    labels[item.a].classList.add('correct');
    if (chosen === item.a) total++;
    else if (chosen !== undefined) labels[chosen].classList.add('wrong');
  });
  document.getElementById('pts').textContent = total;
  let v;
  if (total >= 17) v = "Excellent — tu maîtrises les bases 🎯";
  else if (total >= 12) v = "Bien — bonnes fondations 👍";
  else if (total >= 8) v = "Correct — continue à pratiquer 📘";
  else v = "À retravailler — courage, ça vient ! 💪";
  document.getElementById('verdict').textContent = v;
  const rep = document.getElementById('report');
  rep.classList.add('show');
  rep.scrollIntoView({behavior:'smooth'});
  submitBtn.disabled = true;
});
</script>
